name: Fantrax Draft State Sync
type: External Platform Sync Pattern
location:
  - app/Services/SyncFantraxDraftState.php
  - app/Jobs/SyncFantraxDraftStateJob.php
  - app/Console/Commands/FantraxDraftsPollCommand.php
  - app/Events/FantraxDraftPickToast.php
  - app/Listeners/AnnounceFantraxDraftPick.php
  - database/migrations/*_create_drafts_tables.php
purpose: Fetch Fantrax draft payloads and mirror them into canonical Draft Central tables.
when_to_use:
  - Polling Fantrax draft payloads for connected platform leagues.
  - Bootstrapping a read-only Fantrax draft mirror during league refresh when no canonical draft exists.
  - Persisting Fantrax draft payloads already fetched for the community league draft panel into canonical draft rows.
  - Comparing the latest provider draft result against canonical draft_picks.
  - Emitting app events when an unmade pick receives a Fantrax player id.
  - Posting pick-made announcements to a configured Discord draft channel.
  - Broadcasting user-channel toast events for detected draft picks.
when_not_to_use:
  - Rendering the community league drafting window directly from Fantrax payloads.
  - Persisting every raw polling snapshot for audit history.
  - Syncing Fantrax roster memberships.
rules:
  - The first observed draft payload establishes baseline canonical draft_picks and must not emit pick-made events.
  - Fantrax league refresh may bootstrap a platform_mirror draft only when no draft exists for the platform league and Fantrax exposes draft data.
  - Fantrax league refresh draft bootstrapping must be read-only and must not create notification settings or require commissioner action.
  - Community league page API fallbacks may dispatch payload-backed draft sync jobs instead of forcing a second immediate Fantrax fetch.
  - A pick-made delta occurs when an existing canonical draft_picks row has no provider player id and the latest provider payload supplies one.
  - Recurring background polling must only dispatch API-backed draft sync jobs for canonical drafts whose platform is fantrax, source_type is platform_mirror, and status is live.
  - Scheduled, complete, unknown, and missing drafts must not be discovered or refreshed by recurring background polling.
  - Complete Fantrax mirror drafts must not retain current pick, on-clock, next-pick, or countdown state.
  - Provider pick order must be keyed by provider pick data, preferring overall pick when available.
  - Raw provider payloads may be retained for comparison diagnostics but migrations remain the schema source of truth.
  - Discord posting and other side effects must subscribe to DraftPickMade and use canonical draft_picks as their source.
  - Draft pick announcement side effects must atomically claim the persisted draft pick before broadcasting toast or posting to Discord.
  - A non-null draft_picks.announced_at means toast and Discord announcement side effects have already been attempted for that pick.
  - Fantrax draft cache tables are legacy audit/cache surfaces and must not drive Draft Central UI, polling eligibility, current-pick selection, queue removal, or Discord notifications.
  - Discord draft announcements must use the organization league pivot draft notification channel.
  - Discord draft announcements should post generated player-card images as direct file attachments when runtime image support is available.
  - Discord draft announcement cards must use GP/G/A/PTS for skaters and GP/W/SV/SV% for goalies detected by canonical or provider position.
  - Discord draft announcements should use explicit user mentions only for connected Discord users and fall back to text labels otherwise.
  - Discord draft announcement text may be sent after the generated image attachment so Discord renders the text below the card.
  - Discord draft announcements may attach a temporary generated player-card image when runtime image support is available; temporary files must be deleted after the send attempt.
  - Draft pick toast broadcasts should target organization members through their private user channels.
public_interface:
  - SyncFantraxDraftState::sync
  - SyncFantraxDraftState::syncIfAvailable
  - SyncFantraxDraftState::syncPayloads
  - SyncFantraxDraftStateJob
  - fantrax:drafts:poll
  - FantraxDraftPickToast
  - AnnounceFantraxDraftPick
example_usage: |
  SyncFantraxDraftStateJob::dispatch($platformLeague->id);
