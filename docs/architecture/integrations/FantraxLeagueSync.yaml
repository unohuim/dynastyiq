name: Fantrax League Sync
type: External Platform Sync Pattern
location:
  - app/Services/FantraxLeagueService.php
  - app/Services/SyncFantraxLeague.php
  - app/Services/FantraxScoringCategoryMapper.php
  - app/Services/PlatformLeagueScoringCategoryService.php
  - app/Services/PlatformLeaguePlayerStatService.php
  - app/Services/FantraxLogoSyncService.php
  - app/Support/FantraxViewerScope.php
  - app/Support/FantraxLogoBrowserProfile.php
  - app/Services/ImportFantraxLeagues.php
  - app/Services/ImportFantraxPlayers.php
  - app/Console/Commands/FantraxInspectLogosCommand.php
  - app/Http/Controllers/LeagueController.php
  - app/Http/Controllers/CommunityLeagues.php
  - routes/web.php
  - app/Events/TeamLogosSynced.php
  - app/Events/LeagueSyncStatusUpdated.php
  - app/Jobs/SyncFantraxLeagueJob.php
  - app/Jobs/SyncFantraxTeamJob.php
  - app/Listeners/SyncFantraxRosterMembershipsForLinkedIdentity.php
  - app/Models/PlatformLeague.php
  - app/Models/PlatformLeaguePlayerStat.php
  - app/Models/PlatformLeagueScoringCategory.php
  - app/Models/PlatformTeam.php
  - app/Models/PlatformRosterMembership.php
  - app/Models/PlatformPlayerId.php
purpose: Map Fantrax leagues, teams, rosters, and player identities into platform-neutral tables.
when_to_use:
  - Syncing Fantrax leagues.
  - Updating Fantrax rosters.
  - Resolving Fantrax player identity.
  - Rendering league availability.
when_not_to_use:
  - NHL source-of-truth stats imports.
  - Patreon membership syncing.
rules:
  - Fantrax-specific data must map into platform-neutral models when it powers app features.
  - Roster sync must preserve canonical player identity links through platform player IDs.
  - Roster sync must repair stale or missing fantrax_players mirrors from matched Fantrax player_external_identities before deciding current roster memberships.
  - Fantrax league and team logo URLs should be persisted on platform-neutral league and team rows when exposed by provider payloads, and must remain optional.
  - Fantrax logo source paths must be discovered from provider payloads before persistence logic depends on a new logo field.
  - Fantrax team logo URLs must not be derived from provider team IDs because Fantrax web logo paths use a logo id that can differ from the team id.
  - Queued Fantrax league refreshes must preserve existing platform_teams.logo_url values when provider refresh payloads omit logo fields.
  - Authenticated Fantrax web logo sync must be skipped unless a configured persistent browser profile directory is ready.
  - Authenticated Fantrax web logo sync backend code must remain league-scoped and persist only explicit provider logo URLs.
  - The commissioner-facing Fantrax web logo sync UI entry point may be exposed from league setup surfaces, but must still rely on the configured authenticated browser profile readiness checks before collecting logos.
  - Completed authenticated Fantrax web logo syncs may broadcast a user-scoped logo update event so league list UI can update without a page refresh.
  - Roster sync must persist provider roster slot, membership status, and eligibility metadata when Fantrax exposes those values.
  - Roster sync may persist provider-specific roster metadata, including Fantrax salary and contract labels, on platform_roster_memberships.metadata when it powers league UI features.
  - Fantrax league scoring categories must be enriched from the platform category mapping dictionary during league sync when dictionary rows exist.
  - Provider scoring categories that power league UI must be persisted to platform_league_scoring_categories; platform_leagues.scoring_settings may retain raw provider scoring payload for fallback and audit context.
  - Provider scoring category sync must normalize shorthand group names before identity comparison, including SKATING to HOCKEY_SKATING and GOALIE to HOCKEY_GOALIE.
  - Provider scoring category sync must upsert current categories and delete stale categories that are no longer present in the provider payload.
  - Fantrax scoringSystem.type must be persisted with league scoring settings; points leagues may compute fantasy point totals from scoring category weights, while rotisserie/category leagues must not be treated as points leagues.
  - Fantrax scoring category weights must prefer scoringCategorySettings configs weight values, with scoringCategories shorthand values used only as fallback or shorthand reconciliation.
  - Provider-earned fantasy player stats that power league fantasy results must persist to platform_league_player_stats and must not be inferred from DynastyIQ NHL source-of-truth season stats.
  - NHL season stats may remain available for scouting or comparison views, but Fantrax league fantasy standings and earned player totals must use provider-earned stat rows when available.
  - Fantrax public API does not currently expose individual fantasy stat totals; provider stat sync must remain dormant unless a verified provider payload is configured.
  - Fantrax player stat sync must be non-blocking; roster, team, and scoring sync must continue when provider stat rows are unavailable.
  - Fantrax league stats views may show provider scoring categories that DynastyIQ cannot locally derive only when provider-earned stat rows supply those category values.
  - Manual league scoring mappings may target native stat fields or imported dictionary formulas and must override dictionary auto mappings while preserving support metadata for warnings.
  - Scheduled league refresh should use the same league sync path as the user-triggered top-level Leagues refresh action and should run on a four-hour cadence.
  - Resolved platform league settings may provide custom_cap, salary_cap, cap_limits_by_season, cap_adjustments_by_team, max_active_buyouts, max_active_retentions, and Fantrax contract code definitions from shared league-admin settings or manager-local fallback settings through PlatformLeagueSettingsResolver.
  - Resolved custom_cap defaults to false and, when true, league Cap views must use persisted Fantrax roster salaries instead of CapWages cap hits.
  - Resolved salary_cap may store a legacy team salary cap in whole dollars, and league Cap views may use it only as fallback when a season-specific ceiling is not configured.
  - Resolved cap_limits_by_season may store season-specific floor and ceiling values in whole dollars for league Cap views.
  - Resolved cap_adjustments_by_team may store team-scoped buyout and retention charges with persisted season values so future contract corrections do not rewrite saved planning assumptions.
  - League Cap views may show cap space as season ceiling minus non-minor roster cap hit minus team buyout and retention charges while including IR players.
  - Fantrax custom salary seasons turn over on July 1; before July 1, the current season starts in the previous calendar year, and on or after July 1, the current season starts in the current calendar year.
  - Resolved fantrax_contract_code_definitions may store meanings for detected Fantrax contract code prefixes, while raw provider contract labels remain preserved on roster membership metadata.
  - Fantrax roster display eligibility must derive from observed Fantrax slot usage for the platform player across current memberships, falling back to fantrax_players.position only when no real position slots are observed.
  - Fantrax roster item status is authoritative for roster grouping; ACTIVE maps to active, RESERVE maps to reserve/bench, and MINORS maps to minor.
  - Linking a Fantrax provider identity to a canonical player must update the staged Fantrax player row and queue roster syncs instead of directly guessing roster memberships.
  - User-triggered league sync jobs may broadcast LeagueSyncStatusUpdated events to the requesting user's private channel for transient Leagues UI feedback.
  - Fantrax enum-like values must remain documented in docs/ENUMS.md.
  - Fantrax league sync must persist provider league shape metadata under platform_leagues.settings.league_shape when getLeagueInfo exposes player-pool, team, period, salary, contract, or draft-shape clues.
  - Fantrax league shape must derive player_pool_scope from poolSettings.duplicatePlayerType; unknown duplicate-player values must remain diagnostic and must not be treated as division-scoped availability.
  - Fantrax team division or pool labels must be preserved on platform_teams.extras when getLeagueInfo exposes them through top-level team entries or teamInfo entries.
  - Fantrax playerInfo parsing must support both flat player maps and division-grouped maps, and division-grouped availability must retain pool context when duplicate players are scoped across divisions.
  - Fantrax roster slot settings must be upserted to platform_league_roster_slots from getLeagueInfo.rosterInfo.positionConstraints during league sync.
  - Fantrax logo candidate persistence must match local platform teams by provider team ID first, then by normalized provider team name when provider IDs do not align.
  - Fantrax logo inspection must evaluate every configured league-scoped source URL before deciding no selected-league team logos were found; shortcut payloads from other leagues must not end a selected league sync early.
  - Fantrax logo persistence during selected league sync must ignore candidates that explicitly belong to a different Fantrax league.
  - Fantrax logo sync responses must distinguish skipped runs, no-candidate runs, unmatched-candidate runs, and persisted updates so commissioner-facing setup surfaces do not show false-positive success.
  - User-facing league reads in division-scoped Fantrax leagues must default to the viewer's own Fantrax division or pool, including commissioner users in the /leagues experience; all-division views belong in a separate explicit management surface.
  - Fantrax viewer division scope must be resolved through FantraxViewerScope when applied across league controllers, stats ownership hydration, or other /leagues read payloads.
public_interface:
