name: Fantrax User Connection
type: External Platform Integration Pattern
location:
  - app/Http/Controllers/FantraxUserController.php
  - app/Models/IntegrationSecret.php
  - app/Services/ImportUserFantraxLeagues.php
  - app/Events/FantraxUserConnected.php
  - app/Listeners/HandleFantraxUserConnected.php
purpose: Store a user's Fantrax integration secret and trigger Fantrax league and team imports for that user.
when_to_use:
  - Connecting a user's Fantrax account.
  - Disconnecting a user's Fantrax account.
  - Refreshing a user's Fantrax leagues.
when_not_to_use:
  - Organization-owned provider accounts.
  - Patreon sync.
  - Discord OAuth login.
rules:
  - Fantrax credentials belong in IntegrationSecret.
  - User connection events trigger downstream Fantrax imports.
  - Fantrax connection state must not be treated as application authentication.
public_interface:
  - integrations.fantrax.save
  - integrations.fantrax.disconnect
  - IntegrationSecret
  - FantraxUserConnected
example_usage: |
  event(new FantraxUserConnected($user));

