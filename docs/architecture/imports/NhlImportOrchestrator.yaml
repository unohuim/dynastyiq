name: NHL Import Orchestrator
type: Queue Orchestration Pattern
location:
  - app/Support/NhlImportStages.php
  - app/Services/NhlImportOrchestrator.php
  - app/Services/NhlGameSourcePreflight.php
  - app/Repositories/NhlImportProgressRepo.php
  - app/Jobs/NhlOrchestratorJob.php
  - app/Jobs/ImportPbpNhlJob.php
  - app/Jobs/SummarizePbpNhlJob.php
  - app/Jobs/ImportShiftsNhlJob.php
  - app/Jobs/ImportBoxscoreNhlJob.php
  - app/Jobs/ValidateNhlGameSummaryJob.php
  - app/Jobs/MakeShiftUnitsNhlJob.php
  - app/Jobs/ConnectEventsShiftUnitsNhlJob.php
  - app/Jobs/SumNhlGameUnitsJob.php
purpose: Move NHL game imports through explicit progress stages while tracking status, dependencies, failures, and stale running jobs.
when_to_use:
  - Scheduling game-level NHL imports.
  - Executing staged NHL game imports.
  - Enforcing import dependency order.
when_not_to_use:
  - One-off admin imports that do not use nhl_import_progress.
  - Synchronous request-time imports.
rules:
  - The orchestrator owns NHL import stage advancement.
  - Canonical stage order, dependencies, job mappings, and stale-timeout config keys must come from NhlImportStages.
  - Jobs must report success and failure through the orchestrator or repository contract.
  - Jobs must attempt raw provider troubleshooting export before marking a game stage failed.
  - Import status values must remain aligned with docs/ENUMS.md.
  - Jobs must only perform work that has already been atomically claimed as running.
  - Scheduled run-aware processing must scope discovery-owned stage rows by nhl_import_progress.run_id when a run id is provided.
  - nhl:process is a lightweight supervisor that claims or resumes a discovery run and fills configured active game slots; it must not batch-dispatch fixed date counts.
  - Run-aware scheduled processing must be game-first: each active game advances through one stage at a time, and active game concurrency is capped by config/apiImportNhl.php active_game_import_slots.
  - Completed stages must advance the same game forward through the next ready stage instead of waiting for other games to reach the same stage.
  - Terminal game completion or stage failure must ask the run supervisor to fill freed active game slots so the next game can start without waiting for the scheduled command.
  - Discovery runs may intentionally reprocess existing game/stage rows by reattaching matching progress rows to the selected run and resetting them to scheduled before filling active game slots.
  - Reprocessing existing rows is an explicit operator action and must not happen during ordinary discovery.
  - The PBP stage must pass core NHL source preflight before the game pipeline claims or dispatches any stage.
  - Source preflight gaps must leave provider-source details in nhl_game_source_statuses.
  - Missing shiftcharts must skip only shift-derived on-ice stages and allow validation to run for comparable core fields.
  - Season stat rollups must wait until terminal summary validation stages have completed.
public_interface:
  - NhlImportOrchestrator::processScheduled()
  - NhlImportOrchestrator::fillActiveGameSlotsForRun()
  - NhlImportOrchestrator::claim()
  - NhlImportOrchestrator::isRunning()
  - NhlImportOrchestrator::onSuccess()
  - NhlImportOrchestrator::onFailure()
  - NhlImportOrchestrator::sweepStale()
example_usage: |
  app(NhlImportOrchestrator::class)->processScheduled('2026-01-15');
