  - app/Console/Commands/RefreshNhlGoalieDecisionsCommand.php
  - app/Console/Commands/RefreshNhlSpecialTeamsSplitsCommand.php
  - app/Jobs/RefreshNhlGoalieDecisionJob.php
  - app/Jobs/RefreshNhlSpecialTeamsSplitsJob.php
  - app/Services/ImportNHLPlayByPlay.php
  - app/Services/NhlPbpEventNormalizer.php
  - app/Services/NhlGameImportEligibility.php
  - app/Services/NhlGameImportRebuilder.php
  - app/Services/NhlGameSourcePreflight.php
  - app/Services/NhlPlusMinusCalculator.php
  - app/Services/SumNHLPlayByPlay.php
  - app/Services/ImportNhlShifts.php
  - app/Services/ImportNhlBoxscore.php
  - app/Services/CompareNhlPbPBoxscore.php
  - app/Services/ValidateNhlGameSummary.php
  - app/Services/NhlValidationTroubleshootingExporter.php
  - app/Services/MakeNhlGameShiftUnits.php
  - app/Services/ConnectEventsToUnitShifts.php
  - app/Services/SumNhlGameUnits.php
  - app/Services/SumNhlGameStrengthUnits.php
  - app/Services/SumNhlSeasonStats.php
purpose: Own the NHL data transformations used by queued import jobs and admin commands.
when_to_use:
  - Implementing a single NHL import stage.
  - Changing a single NHL import transformation.
  - Reusing an import transformation from a job or command.
when_not_to_use:
  - Coordinating stage order.
  - Tracking import progress state.
  - Discovering games.
rules:
  - Stage services own transformation behavior only.
  - Stage ordering belongs to NhlImportOrchestrator.
  - Progress persistence belongs to NhlImportProgressRepo.
  - Import upserts must use stable provider or derived natural identities.
  - Play-by-play events are naturally identified by nhl_game_id plus nhl_event_id.
  - Play-by-play imports must preserve raw provider event and details payloads in play_by_plays.metadata for audit and validation context.
  - Derived play-by-play summaries must use NhlPbpEventNormalizer for boxscore-comparable shot, shootout, empty-net, and penalty-minute semantics.
  - Player game summaries are naturally identified by nhl_game_id plus nhl_player_id.
  - Raw shift imports must update player game summary time on ice and shift counts for the same game and player.
  - Raw shift imports must ignore provider shift rows whose team abbreviation is not one of the stored game home or away teams.
  - Play-by-play and shiftcharts are the processing sources for derived game summaries; official boxscore rows are validation and reconciliation targets, not substitute source rows except for documented goalie-facing stat reconciliation and tiny skater TOI-only reconciliation.
  - Import services must not copy official boxscore values into derived summaries solely to silence validation deltas, except for goalie-facing totals whose PBP events can omit goalieInNetId, or when a skater has only a time-on-ice delta under 20 seconds, shift count matches, and raw shiftcharts are available.
  - PBP game summarization must reconcile goalie-facing goals against, saves, shots against, strength splits, save percentage, goals-against average, and time on ice from official boxscore rows after PBP-derived summaries are persisted.
  - Goalie empty-net shiftchart artifacts must be excluded from normalized shift-derived outputs when play-by-play goalie and situation state proves the goalie was no longer on ice, while raw provider payload files remain preserved for audit.
  - Boxscore import must run before shift import so official shift and time-on-ice targets are available to shift reconciliation.
  - Game import stages must process only NHL game types documented as supported in docs/ENUMS.md.
  - Play-by-play import must establish the provider game type before later stages advance.
  - Later game import stages must not run unless PBP has stored an allowed game type for the game.
  - Penalty-shot attempts must preserve the raw attempt situation code but derive stored strength from the same-clock penalty-shot penalty row when the attempt situation is reset to penalty-shot-only manpower.
  - Core NHL game import stages require PBP and boxscore feeds.
  - Shift-derived on-ice stages additionally require the shiftcharts feed.
  - Source preflight must store exact provider URLs and source-specific reasons for empty or unavailable feeds.
  - Summary validation may return incomplete when source coverage prevents validating shift-dependent fields.
  - Summary validation may return invalidated for game type 1 when preseason provider deltas exist but the game import should continue.
  - Explicit reprocess runs must delete game-scoped stage-owned rows before importing or recalculating that stage so provider removals do not leave stale play-by-play, boxscore, shift, summary, unit, or event-link data.
  - Explicit game rebuilds must clear game-scoped raw and derived import rows before requeueing the canonical pipeline from PBP.
  - Explicit game rebuilds must not delete global unit composition records that can be reused by other games.
  - Shift imports may drop shiftchart-only player rows only when both official boxscore rows and imported play-by-play rows exist for the game and neither source references that player.
  - Shift imports may use already-imported official boxscore shifts and time on ice to choose between provider shiftchart alternatives, including exact duplicate-row TOI credits that do not change shift count, but must not mutate raw provider event fields.
  - Shift imports may replace a contained provider shift row with another row for the same player, period, and shift number only when the normalized shift count already matches official boxscore shifts and the replacement exactly reconciles official boxscore time on ice.
  - Shift imports may trim or drop overtime-only shiftchart time after an early OT game-end boundary when imported play-by-play proves the overtime period ended before its scheduled limit.
  - Goalie shift imports may use official goalie boxscore time on ice as a reconciliation target for dropping exact-duration malformed shiftchart artifacts because official goalie boxscore shift counts are zero; they must still store time on ice from the remaining normalized raw shift rows.
  - Goalie decision summaries must preserve regulation, overtime, and shootout win/loss splits at the game-summary level before season aggregation.
  - Goalie decision backfills may refresh game-summary decisions from official boxscore goalie rows without rerunning play-by-play, shift, or unit stages, and may dispatch one queue job per game for large windows.
  - Special-teams split backfills may rebuild PBP-derived game summaries from already imported play-by-play rows without refetching provider data or rerunning shift and unit stages, and may dispatch one queue job per game for large windows.
  - PBP summary imports may skip a missing player summary row when the NHL player landing endpoint returns 404 while trying to create that player record; non-404 landing failures remain fatal.
  - Goalie season games played must count only game-summary rows with time on ice greater than zero so dressed-backup summary rows do not inflate goalie GP.
  - Shift imports may drop skater rows that create impossible team skater counts under play-by-play situation codes only when the same row also exactly reconciles that player's official boxscore shift count and time on ice.
  - Shift imports may drop skater rows fully inside that skater's own major, misconduct, game misconduct, or match penalty window only when those rows exactly reconcile that player's official boxscore shift count and time on ice.
  - Shift summary persistence may borrow a non-goalie official boxscore shift count when normalized shiftcharts are exactly one shift short, time on ice is within one second of official, and no raw shift row is available to add.
  - Shift summary persistence may transfer time on ice and one shift between same-team non-goalie summaries when official boxscore totals prove an equal-and-opposite provider misallocation and raw shift rows do not expose a clean row to move.
  - Summary validation compares official boxscore totals against computed summaries before downstream trust.
  - Game stage stoppages should write raw provider payload text files for boxscore, play-by-play, and shifts when a troubleshooting path is configured.
  - Failed or invalidated summary validations should write per-game troubleshooting snapshots and raw provider payload text files for boxscore, play-by-play, and shifts when a troubleshooting path is configured.
  - Unit shifts are naturally identified by unit_id plus nhl_game_id plus start_game_seconds.
  - Event-unit links are naturally identified by event_id plus unit_shift_id.
  - Skater plus/minus must be calculated from eligible linked goal events after event-unit links exist.
  - Plus/minus calculations must count even-strength and shorthanded goals, exclude power-play goals, exclude shootout goals, exclude penalty-shot goals, and deduplicate a player once per goal event.
  - Persisted player-game plus/minus must reconcile to official boxscore values when available because exact goal-time shift boundaries can be provider-ambiguous.
  - Strength-aware on-ice summaries are naturally identified by game plus unit or player plus strength.
  - nhl:empty --games may remove NHL game-derived import data, progress, admin run ledgers, and validations, but must not delete canonical players, NHL team reference data, or NHL player external identities.
  - nhl:empty --games must clear game-derived tables with visible per-table progress rather than one long silent transaction.
  - nhl:empty --players may remove imported NHL player stats and NHL/NHL draft player external identities, and must not delete canonical players, NHL team reference data, or game-derived import data.
