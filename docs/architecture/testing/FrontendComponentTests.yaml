name: Frontend Component Tests
type: JavaScript Test Pattern
location:
  - resources/js/components/toast-stack.test.js
  - resources/js/components/__tests__/community-members-store.test.js
  - resources/js/admin/admin-hub.test.js
purpose: Test reusable frontend modules independently from Blade rendering.
when_to_use:
  - New reusable JavaScript modules.
  - Changes to existing page-state helpers.
  - Changes to frontend utility behavior.
when_not_to_use:
  - Backend domain behavior.
  - Browser-level end-to-end assertions.
rules:
  - Reusable frontend behavior should have direct JavaScript tests.
  - Tests should assert behavior rather than incidental implementation structure.
  - UI constraints still come from docs/UI_DESIGN.md.
public_interface:
  - resources/js/components/*.test.js
  - resources/js/components/__tests__/
  - resources/js/admin/admin-hub.test.js
example_usage: |
  expect(store.members.length).toBe(1);

