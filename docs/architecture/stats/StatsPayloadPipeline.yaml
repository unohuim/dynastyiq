  - resources/js/components/StatsPage/stats-utils.js
purpose: Build stats payloads through explicit request context, parsed filters, schema metadata, row assembly, and frontend payload consumption boundaries.
when_to_use:
  - League stats payloads.
  - Perspective-driven player stats payloads.
  - JSON-fed stats report views, including stats unit reports.
  - Prospects and draft-player stats payloads.
  - Refactoring stats query, schema, or row assembly behavior into reusable services.
when_not_to_use:
  - NHL import aggregation pipelines.
  - Discord bot runtime.
  - One-off admin reports that do not expose the stats payload contract.
rules:
  - Stats payload responses must preserve headings, data, settings, and meta keys unless a breaking contract change is explicitly approved.
  - HTTP request parsing must be normalized before query filtering or schema generation.
  - Query-backed filters and post-assembly derived filters must remain distinct.
  - The backend owns hockey, fantasy, scoring, and stats semantics.
  - Frontend stats modules may render schema and manage UI state but must not become the source of truth for stats semantics.
  - Schema caching must be keyed by the request context that can affect available filters, bounds, or columns.
  - League ownership hydration must remain a payload decoration step after platform player-universe filtering.
  - League ownership maps may use five-minute cache keys scoped by league, user, and platform while row decoration remains request-payload specific.
  - Division-scoped Fantrax league stats payloads must hydrate fantasy ownership only for the viewer's own Fantrax division or pool, using the shared FantraxViewerScope resolver.
  - Synthetic league scoring perspectives and Fantrax goalie column groups must be built through a dedicated backend factory rather than page JavaScript.
  - Fantrax league scoring perspectives may add read-time computed Fantasy Pts and Fantasy Pts/G columns only when persisted league scoring metadata identifies the league as a points league.
  - Read-time fantasy point totals must use persisted provider scoring category weights and supported DynastyIQ stat/formula mappings; category or rotisserie leagues must continue to show category columns without a combined fantasy point total.
  - League Players may expose report-level presentation perspectives such as Basic, Advanced, and Prospects while the backend maps them to concrete saved skater or goalie perspectives based on goalie column-group state.
  - League prospect payloads must show one row per player for the selected season, using the non-NHL league where that player had the most games played and summing rows only within that league.
  - League prospect presentation must suppress roster-status row coloring and sectioning while using normalized position order C, L, R, D, G only for the default sort before the user selects a stat column.
  - Platform player-universe filtering must remain a dedicated backend payload filter before ownership hydration.
  - Stats report UIs should consume server JSON payloads and apply sort, display-mode, and filter interactions without full page refreshes.
  - StatsPayloadClient may translate active goalie filter state into column_group=goalie until the backend exposes an explicit active column-group request contract.
public_interface:
  - StatsQueryContext
  - StatsFilterSet
  - SeasonStatsPayloadRequest
  - RangeStatsPayloadRequest
  - StatsQueryFilterApplier
  - StatsFilterSchemaProvider
  - StatsDerivedFilterApplier
  - StatsPayloadAssembler
